name: PDFtoIMAGEtoOCR

on:
  schedule:
    - cron: '0 0 * * 0'  # প্রতি সাপ্তাহে রবিবার রাত ১২ টা
  
  workflow_dispatch:
    inputs:
      max_pdfs:
        description: 'সর্বোচ্চ PDF সংখ্যা (Default Fallback)'
        required: false
        default: '50'
      batch_size:
        description: 'ব্যাচ সাইজ (Default Fallback)'
        required: false
        default: '50'
      max_files_per_commit:
        description: 'প্রতি Commit-এ সর্বোচ্চ ফাইল (Default Fallback)'
        required: false
        default: '50'
      image_zoom:
        description: 'ইমেজ জুম (Default Fallback)'
        required: false
        default: '4.0'
      image_dpi:
        description: 'ইমেজ DPI (Default Fallback)'
        required: false
        default: '300'
      max_workers:
        description: 'ডাউনলোড ওয়ার্কার (Default Fallback)'
        required: false
        default: '2'
      max_parallel_pdfs:
        description: 'প্যারালাল PDF প্রসেসিং (Default Fallback)'
        required: false
        default: '2'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # ৬ ঘন্টা
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install minimal dependencies for PyMuPDF
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libgomp1
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF huggingface-hub pymongo dnspython psutil
    
    - name: Show system info
      run: |
        echo "=== CPU Info ==="
        lscpu | grep "Model name\|CPU(s)" || true
        echo ""
        echo "=== Memory Info ==="
        free -h
        echo ""
        echo "=== Disk Info ==="
        df -h /tmp
    
    - name: Run optimized processor
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_DATASET: ${{ secrets.HF_DATASET }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        MONGODB_DB: ${{ secrets.MONGODB_DB }}
        MONGODB_COLLECTION: ${{ secrets.MONGODB_COLLECTION }}
        MAX_PDFS_PER_RUN: ${{ github.event.inputs.max_pdfs || '50' }}
        PDF_BATCH_SIZE: ${{ github.event.inputs.batch_size || '50' }}
        MAX_FILES_PER_COMMIT: ${{ github.event.inputs.max_files_per_commit || '50' }}
        IMAGE_ZOOM: ${{ github.event.inputs.image_zoom || '3.0' }}
        IMAGE_DPI: ${{ github.event.inputs.image_dpi || '300' }}
        MAX_WORKERS: ${{ github.event.inputs.max_workers || '2' }}
        MAX_PARALLEL_PDFS: ${{ github.event.inputs.max_parallel_pdfs || '2' }}
        PDF_SLEEP_BETWEEN: '1'
        MAX_RETRIES: '3'
      run: python main.py
